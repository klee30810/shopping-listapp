<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
    }

    h1 {
      font-size: 1.6rem;
      color: #2d3748;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #e53e3e;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .clear-btn:hover {
      background: #fff5f5;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 8px;
      transition: background 0.15s;
      border-bottom: 1px solid #f0f4f8;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #f7fafc;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .checkbox {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요" maxlength="60">
      <button onclick="addItem()">추가</button>
    </div>
    <div class="stats">
      <span id="statsText">총 0개 / 완료 0개</span>
      <button class="clear-btn" onclick="clearChecked()">완료 항목 삭제</button>
    </div>
    <ul id="list"></ul>
    <div class="empty" id="emptyMsg">아이템을 추가해보세요!</div>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');

    function save() {
      localStorage.setItem('shoppingList', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const emptyMsg = document.getElementById('emptyMsg');
      const statsText = document.getElementById('statsText');

      const total = items.length;
      const done = items.filter(i => i.checked).length;
      statsText.textContent = `총 ${total}개 / 완료 ${done}개`;
      emptyMsg.style.display = total === 0 ? 'block' : 'none';

      list.innerHTML = '';
      items.forEach((item, idx) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'checkbox';
        cb.checked = item.checked;
        cb.addEventListener('change', () => toggleItem(idx));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.title = '삭제';
        del.textContent = '×';
        del.addEventListener('click', () => deleteItem(idx));

        li.appendChild(cb);
        li.appendChild(span);
        li.appendChild(del);
        list.appendChild(li);
      });
    }

    function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, checked: false });
      input.value = '';
      save();
      render();
      input.focus();
    }

    function toggleItem(idx) {
      items[idx].checked = !items[idx].checked;
      save();
      render();
    }

    function deleteItem(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
